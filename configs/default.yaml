video:
  # Path to the source video.
  # Relative paths are resolved from the project root, so the program
  # works no matter which directory it is launched from.
  input_path: "data/raw/test_video.mp4"

  # Root directory where results are saved.
  # Relative paths are resolved from the project root.
  # Each video gets its own subfolder containing a "windows" directory
  # (one folder per time window) and a manifest.json.
  output_dir: "data/processed/"

  # Duration of a single time window, in seconds.
  # Combined with the effective FPS this decides how many source frames
  # one window spans, e.g. 2s * 30fps = 60 frames per window.
  n_sec_per_window: 1.2

  # How many images to keep from each window.
  # These frames are sampled evenly across the whole window, not taken
  # from its beginning only.
  n_img_per_window: 6

  # What to do if the output folder for this video already exists:
  # true  -> delete it and rewrite from scratch
  # false -> stop with an error
  overwrite: true

  # Optional manual FPS override (fallback).
  # null  -> read FPS automatically from the video metadata.
  # number -> force this FPS, useful for videos with missing or broken
  #           metadata. Must be a positive number.
  fps_override: null

  # Where extraction starts, in seconds from the beginning of the video.
  # Lets a long fight be processed piece by piece.
  start_seconds: 0

  # Where extraction stops, in seconds. null -> until the end of the video.
  end_seconds: null

  # Maximum number of windows to keep (applied after start/end).
  # null -> no limit. Handy to cap how many Gemini requests the
  # description step will later make.
  max_windows: null

# Note: the final, shorter-than-full slice of the video is NOT discarded.
# It becomes the last (partial) window so no footage is lost.

# Directory where the per-run error JSON files are written
# (one file per launch, named errors_<date>_<time>.json).
# A relative path is resolved from the project root. The file is only
# created if at least one error happened during the run.
error_log_dir: "logs"

descriptions:
  # Manifest produced by the extraction step; lists the windows to describe.
  # The descriptions JSON is written next to this manifest, inside the same
  # per-video processed folder (data/processed/<video>/descriptions.json), so
  # every video's artifacts stay self-contained. Windows already present in
  # that file are skipped, so re-running is safe.
  manifest_path: "data/processed/test_video/manifest.json"

  # Pause between Gemini requests, in seconds (free-tier rate limits).
  request_delay_seconds: 2

  # Extra attempts after a failed Gemini call before the window is skipped.
  # A timed-out call (see response_timeout_seconds) counts as a failed
  # attempt too, so with retry_attempts: 1 each window gets at most
  # 2 requests before it is skipped and the run moves on.
  retry_attempts: 1

  # Maximum seconds to wait for one Gemini response.
  # If no answer arrives in time, the stuck request is abandoned, the
  # timeout is printed to the console and saved to the per-run error
  # JSON (logs/errors_<date>_<time>.json), and a fresh request is sent —
  # so one hanging call never stalls the whole run.
  # null -> wait forever (no timeout).
  response_timeout_seconds: 40

  # Text prompt sent to Gemini together with the frames of one window.
  prompt: |
    You are an expert boxing analyst.
    The following images are sequential frames from one short clip (about two seconds) of a boxing match, in chronological order (first image = earliest moment, last image = latest). Read them as a short motion sequence, not as separate independent images.

    1. First identify the two fighters by appearance (shorts color, glove color, any distinctive features), then refer to them ONLY that way (e.g. "the fighter in red shorts").
    2. Describe what happens across the clip as ONE continuous action (not frame by frame): who attacks, punch type (jab / cross / hook / uppercut), target (head / body), result (landed / blocked / missed / slipped), defense (slip, block, clinch, step back), who is pressuring, and ring position (center / ropes / corner).
    3. If little or nothing significant happens (e.g. only footwork or feinting), say so plainly.
    4. Describe ONLY what is visible. If something is unclear, say so — do not invent.

    Output: 2–4 sentences of plain text using natural boxing vocabulary.

embedding:
  # Local sentence-transformers model turning each window description into a
  # vector. This step is PURELY local: it never calls Gemini or any paid API.
  # The first run downloads and caches the model (~80MB) from Hugging Face.
  #
  # all-MiniLM-L6-v2 outputs 384-dimensional vectors. The dimension is fixed
  # by the model, so it is not a config key.
  model_name: "all-MiniLM-L6-v2"

  # How many descriptions to encode per forward pass.
  batch_size: 32

  # Device to run the model on:
  # "auto" -> let sentence-transformers pick (cuda if available, else cpu)
  # "cpu" / "cuda" -> force that device.
  device: "auto"

  # L2-normalize each vector so Step 5 similarity is a plain dot product.
  normalize: true
